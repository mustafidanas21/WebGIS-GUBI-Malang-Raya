<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">GUBI learning flow</title>
  <desc id="desc">A four step learning flow from story map to webgis, quiz, and simulation.</desc>
  <rect width="900" height="620" fill="#f4f7f2"/>
  <path d="M80 335 C190 210 305 380 430 255 C560 130 680 298 820 165" fill="none" stroke="#21a98a" stroke-width="22" stroke-linecap="round" opacity="0.28"/>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(70 160)">
      <rect width="170" height="210" rx="20" fill="#ffffff"/>
      <rect x="28" y="28" width="114" height="78" rx="12" fill="#1b2223"/>
      <circle cx="85" cy="67" r="24" fill="#f8ba52"/>
      <text x="85" y="145" text-anchor="middle" font-size="20" font-weight="800" fill="#1b2223">Story</text>
      <text x="85" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#60706e">pahami konsep</text>
    </g>
    <g transform="translate(270 160)">
      <rect width="170" height="210" rx="20" fill="#ffffff"/>
      <rect x="28" y="28" width="114" height="78" rx="12" fill="#203f3d"/>
      <path d="M36 78 C64 55 92 90 132 58" stroke="#21a98a" stroke-width="10" fill="none"/>
      <text x="85" y="145" text-anchor="middle" font-size="20" font-weight="800" fill="#1b2223">WebGIS</text>
      <text x="85" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#60706e">jelajahi data</text>
    </g>
    <g transform="translate(470 160)">
      <rect width="170" height="210" rx="20" fill="#ffffff"/>
      <rect x="28" y="28" width="114" height="78" rx="12" fill="#f8ba52"/>
      <path d="M58 67 L78 86 L116 48" stroke="#1b2223" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="85" y="145" text-anchor="middle" font-size="20" font-weight="800" fill="#1b2223">Quiz</text>
      <text x="85" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#60706e">uji paham</text>
    </g>
    <g transform="translate(670 160)">
      <rect width="170" height="210" rx="20" fill="#ffffff"/>
      <rect x="28" y="28" width="114" height="78" rx="12" fill="#21a98a"/>
      <circle cx="62" cy="67" r="13" fill="#ffffff"/>
      <circle cx="108" cy="67" r="13" fill="#ffffff"/>
      <text x="85" y="145" text-anchor="middle" font-size="20" font-weight="800" fill="#1b2223">Simulasi</text>
      <text x="85" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#60706e">coba skenario</text>
    </g>
  </g>
</svg>
